spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: none

app:
  jwt:
    # deterministic for tests; base64 string ≥ 256 bits (HS256 requires 32+ bytes raw)
    # decodes to: "test-jwt-secret-key-for-11408-study-platform-integration-test-suite"
    secret: dGVzdC1qd3Qtc2VjcmV0LWtleS1mb3ItMTE0MDgtc3R1ZHktcGxhdGZvcm0taW50ZWdyYXRpb24tdGVzdC1zdWl0ZQ==
    expiration: 86400000
    refresh-expiration: 604800000
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin123
    bucket: study11408
  ai:
    service-url: http://localhost:8000

logging:
  level:
    root: WARN

