server:
  port: 8080
  servlet:
    context-path: /api
    # multipart 上传上限对齐 nginx client_max_body_size 100M，
    # 否则 PDF >10MB（Spring 默认）即被 Tomcat 拒，前端报 500
    encoding:
      charset: UTF-8

spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  datasource:
    url: jdbc:postgresql://localhost:5432/study11408
    username: study11408
    password: study11408_dev
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    # 多处 service 在 DTO 映射时依赖 lazy load（getGraphData/getStudyPath/
    # Topic/Note 等），关闭 open-in-view 会触发 5+ 个 500。显式声明 true 消除
    # warning，并提醒后续 P1-11 改 FETCH JOIN 后再关闭。
    open-in-view: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000

  cache:
    type: redis
    redis:
      time-to-live: 3600000

  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.starttls.enable: true
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000

app:
  jwt:
    secret: c2VjdXJlLWtleS1mb3Itc3R1ZHkxMTQwOC1wbGF0Zm9ybS1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0yMDI0LXZlcnktbG9uZy1zZWNyZXQta2V5LXN0cmluZw==
    expiration: 86400000
    refresh-expiration: 604800000

  mail:
    from: ${MAIL_FROM:${spring.mail.username}}
    from-name: ${MAIL_FROM_NAME:11408 学习平台}

  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin123
    bucket: study11408

  ai:
    service-url: http://localhost:8000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json

logging:
  level:
    root: INFO
    com.study11408: DEBUG

# ─── Observability ──────────────────────────────────────────────────────────
# dev/默认：health/info/prometheus/metrics 全开，方便本地排查；prod 走更严的覆盖
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: 11408study-backend
