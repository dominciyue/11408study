apiVersion: 1

# Grafana 启动时自动从 /etc/grafana/dashboards 目录扫描 .json 并 import
providers:
  - name: "11408study"
    folder: "11408study"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false
