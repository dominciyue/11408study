services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-study11408}
      POSTGRES_USER: ${POSTGRES_USER:-study11408}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-study11408_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-study11408}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-study11408}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-study11408_dev}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_MINIO_ENDPOINT: http://minio:9000
      APP_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      APP_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      APP_MINIO_BUCKET: ${MINIO_BUCKET:-study11408}
      APP_AI_SERVICE_URL: http://ai-service:8000
      APP_JWT_SECRET: ${APP_JWT_SECRET:-c2VjdXJlLWtleS1mb3Itc3R1ZHkxMTQwOC1wbGF0Zm9ybS1qd3QtdG9rZW4tZ2VuZXJhdGlvbi0yMDI0LXZlcnktbG9uZy1zZWNyZXQta2V5LXN0cmluZw==}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:18081}
      TURNSTILE_ENABLED: ${TURNSTILE_ENABLED:-false}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-}
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-11408 学习平台}
    depends_on:
      - postgres
      - redis
      - minio
      - ai-service

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    env_file:
      - ./ai-service/.env
    environment:
      DEBUG: "false"
      # Instrumentator should_respect_env_var=True 时必须显式打开
      PROMETHEUS_ENABLED: "true"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: /api
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-}
    environment:
      # When accessing via nginx on host port 18081.
      NEXT_PUBLIC_API_BASE_URL: /api
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "18081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-service

  # ─── Monitoring profile（默认不启，--profile monitoring up -d 才拉起）──────
  prometheus:
    image: prom/prometheus:v2.54.1
    profiles: ["monitoring"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      # host 19090 被 clash proxy api 占，挪到 19091
      - "19091:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    profiles: ["monitoring"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      # 默认 admin —— 上生产前务必：cp .env.example .env && 改 GRAFANA_ADMIN_PASSWORD
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "13000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.2.0
    profiles: ["monitoring"]
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./monitoring/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    ports:
      - "13100:3100"
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.2.0
    profiles: ["monitoring"]
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./monitoring/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:
