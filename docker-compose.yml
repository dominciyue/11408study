services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: study11408
      POSTGRES_USER: study11408
      POSTGRES_PASSWORD: study11408_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/study11408
      SPRING_DATASOURCE_USERNAME: study11408
      SPRING_DATASOURCE_PASSWORD: study11408_dev
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_MINIO_ENDPOINT: http://minio:9000
      APP_MINIO_ACCESS_KEY: minioadmin
      APP_MINIO_SECRET_KEY: minioadmin123
      APP_MINIO_BUCKET: study11408
      APP_AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - minio
      - ai-service

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    environment:
      DEBUG: "false"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      # When accessing via nginx on host port 18081.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:18081/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "18081:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - ai-service

volumes:
  postgres_data:
  redis_data:
  minio_data:

