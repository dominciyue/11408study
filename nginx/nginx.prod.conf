# 生产 nginx 配置(挂在 docker-compose.prod.yml 的 nginx 容器内)。
# - 80 端口:Certbot ACME challenge + 全量 HTTP→HTTPS 301
# - 443 端口:TLS 终止, HSTS, 安全头, 代理三个上游
# - swagger/v3/api-docs/非白名单 actuator 全部 404, 防信息泄漏
# 第一次部署没证书时,务必先注释掉 443 server 块,只跑 80 让 Certbot 签证书,
# 签完再把 443 块解开。详见 docs/deploy-tencent.md。

upstream java_backend  { server backend:8080; }
upstream ai_service    { server ai-service:8000; }
upstream frontend      { server frontend:3000; }

# ── HTTP → HTTPS 跳转,留 ACME challenge 路径 ──────────────────────────────
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主服务 ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name your-domain.com;  # ⚠️ 部署时替换为真实域名

    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 100M;

    # 生产屏蔽 swagger / 非白名单 actuator(在 backend 上面再加一层)
    location ~ ^/(swagger-ui|v3/api-docs|api/swagger-ui|api/v3/api-docs) {
        return 404;
    }
    location ~ ^/api/actuator/(?!health$|prometheus$|info$) {
        return 404;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://java_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI 服务(public 暴露的子路径)
    location /ai/ {
        proxy_pass http://ai_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Next.js 前端 + websocket(用于 HMR / 实时通道)
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
